<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=600, initial-scale=1.0">
    <title>Vita Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            margin: 10px;
            padding: 0;
        }
        h1 { color: #0078d7; font-size: 24px; text-align: center; }
        h2 { color: #ffaa00; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .container { width: 100%; }
        .column {
            float: left;
            width: 46%;
            margin: 2%;
            background-color: #1e1e1e;
            padding: 10px;
            border-radius: 5px;
            box-sizing: border-box;
        }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 12px; }
        a { color: #4af; text-decoration: none; font-size: 14px; }
        a:hover { text-decoration: underline; }
        .clear { clear: both; }
    </style>
</head>
<body>

    <h1>Vita Portal</h1>

    <div class="container">
        <!-- Column 1: Homebrew & News -->
        <div class="column">
            <h2>Updates & News</h2>
            <ul>
                <li><a href="https://rinnegatamante.it">VitaDB Homebrew</a></li>
                <li><a href="https://wololo.net">Wololo Scene News</a></li>
                <li><a href="https://ign.com">IGN Gaming</a></li>
            </ul>
        </div>

        <!-- Column 2: Social Media Frontends -->
        <div class="column">
            <h2>Social Media</h2>
            <ul>
                <li><a href="https://reddit.com">r/vitahacks (Old Reddit)</a></li>
                <li><a href="https://nitter.net">Nitter (Twitter Client)</a></li>
                <li><a href="https://yewtu.be">Invidious (YouTube Client)</a></li>
            </ul>
        </div>
    </div>

    <div class="clear"></div>

</body>
</html>
