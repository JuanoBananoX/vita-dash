<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=960">
    <title>VitaDash</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>VitaDash</h1>

        <p>
            Reviving the web experience on PlayStation Vita.
        </p>

    </header>

    <main>

        <section class="panel" id="panel-search">

            <h2>Search</h2>
            <div class="panel-content"> 
                <form action="https://duckduckgo.com/html/" method="GET" target="_blank">
                    <input
                        type="text"
                        name="q"
                        placeholder="Search the web">

                    <input
                        type="submit"
                        value="Go">

                </form>
            </div>

        </section>

        <section class="panel" id="panel-links">

            <h2>Quick Links</h2>
            <div class="panel-content"> 
                <nav>
                    <ul>
                        <li>
                            <a href="https://vitadb.rinnegatamante.it" target="_blank" rel="noopener noreferrer">
                                VitaDB
                            </a>
                        </li>

                        <li>
                            <a href="https://wololo.net" target="_blank" rel="noopener noreferrer">
                                Wololo
                            </a>
                        </li>

                        <li>
                            <a href="https://www.reddit.com/r/vitahacks/" target="_blank" rel="noopener noreferrer">
                                VitaHacks
                            </a>
                        </li>

                        <li>
                            <a href="https://archive.org" target="_blank" rel="noopener noreferrer">
                                Internet Archive
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>     
        </section>

        <section class="panel" id="panel-blog">

            <h2>Latest Blog Posts</h2>
            <div class="panel-content">
                <div id="blog-feed">

                    Loading...

                </div>
            </div>
        </section>

        <section class="panel" id="panel-news">

            <h2>Scene News</h2>
            <div class="panel-content"> 
                <div id="scene-feed">

                    Loading...

                </div>
            </div>
        </section>

    </main>

    <footer>

        <p>
            VitaDash v0.1.0
        </p>

    </footer>

    <script src="scripts/feed.js"></script>

</body>

</html>
