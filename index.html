<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=960">
    <title>VitaDash</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>VitaDash</h1>

        <p>
            Reviving the web experience on PlayStation Vita.
        </p>

    </header>

    <main>

        <section class="panel" id="search-panel">

            <h2>Search</h2>

            <form action="https://duckduckgo.com/html/" method="GET">

                <input
                    type="text"
                    name="q"
                    placeholder="Search the web">

                <input
                    type="submit"
                    value="Go">

            </form>

        </section>

        <section class="panel" id="links-panel">

            <h2>Quick Links</h2>

            <nav>

                <ul>

                    <li>
                        <a href="https://vitadb.rinnegatamante.it">
                            VitaDB
                        </a>
                    </li>

                    <li>
                        <a href="https://wololo.net">
                            Wololo
                        </a>
                    </li>

                    <li>
                        <a href="https://www.reddit.com/r/vitahacks/">
                            VitaHacks
                        </a>
                    </li>

                    <li>
                        <a href="https://archive.org">
                            Internet Archive
                        </a>
                    </li>

                </ul>

            </nav>

        </section>

        <section class="panel" id="blog-panel">

            <h2>Latest Blog Posts</h2>

            <div id="blog-feed">

                Loading...

            </div>

        </section>

        <section class="panel" id="news-panel">

            <h2>Scene News</h2>

            <div id="scene-feed">

                Loading...

            </div>

        </section>

    </main>

    <footer>

        <p>
            VitaDash v0.1.0
        </p>

    </footer>

    <script src="scripts/feed.js"></script>

</body>

</html>
